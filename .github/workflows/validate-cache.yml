name: Validate Cache

on:
  push:
    branches:
      - main
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build cache
        run: python tools/build_price_cache.py

      - name: Validate cache
        run: python tools/validate_cache.py
