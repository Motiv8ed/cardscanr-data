name: Update Price Cache

on:
  workflow_dispatch:
  schedule:
    # Every 12 hours
    - cron: "17 */12 * * *"

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build price cache
        env:
          # Optional: set in repository secrets to enable live API fetches
          POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY }}
          POKEWALLET_API_KEY: ${{ secrets.POKEWALLET_API_KEY }}
        run: python tools/build_price_cache.py

      - name: Validate cache
        run: CARDSCANR_VALIDATE_QUIET=1 python tools/validate_cache.py

      - name: Commit updated cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/v1/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update price cache [skip ci]"
            git push
          fi
