name: Update Price Cache
# NOTE: Scheduled auto-commit is intentionally disabled.
# The local PokéWallet catalogue worker (run_pokewallet_catalog_cycle.ps1) is the
# primary data writer for catalogue, price, and image data right now.
# Enabling the schedule while the local worker is active causes push races.
# Re-enable the schedule trigger only when the local worker is decommissioned.
on:
  workflow_dispatch:

# Prevent concurrent repo-writing workflows from racing each other.
concurrency:
  group: cardscanr-data-writer-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history needed so git pull --rebase can integrate remote changes cleanly.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build price cache
        env:
          # Optional: set in repository secrets to enable live API fetches
          POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY || '' }}
          POKEWALLET_API_KEY: ${{ secrets.POKEWALLET_API_KEY || '' }}
          CARDSCANR_CURRENT_PRICE_BATCH_SIZE: "10"
          CARDSCANR_MAX_REQUESTS_PER_HOUR: "90"
          CARDSCANR_MAX_REQUESTS_PER_DAY: "950"
          CARDSCANR_REQUEST_SAFETY_BUFFER: "10"
        run: python tools/build_price_cache.py current_prices

      - name: Validate cache
        run: CARDSCANR_VALIDATE_QUIET=1 python tools/validate_cache.py

      - name: Commit updated cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Exclude temp files from staging to avoid committing runtime state.
          git add public/v1/ data/scheduled_price_refresh_state.json
          git reset HEAD -- '*.tmp' 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update price cache [skip ci]"
            # Rebase onto any commits the local worker may have pushed since checkout.
            git pull --rebase origin main
            git push
          fi
