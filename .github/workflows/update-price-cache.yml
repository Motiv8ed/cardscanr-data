name: Update Price Cache

on:
  workflow_dispatch:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build price cache
        env:
          # Optional: set in repository secrets to enable live API fetches
          POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY }}
        run: python tools/build_price_cache.py

      - name: Validate cache
        run: python tools/validate_cache.py

      - name: Commit updated cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/v1/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update price cache [skip ci]"
            git push
          fi
